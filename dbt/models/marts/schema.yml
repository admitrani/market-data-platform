version: 2

models:
  - name: fact_price_hourly
    description: "Hourly price fact mart for market data analytics and downstream trading features."
    columns:
      - name: symbol
        tests:
          - not_null
      - name: bar_interval
        tests:
          - not_null
      - name: open_time_utc
        tests:
          - not_null
      - name: close
        tests:
          - not_null
      - name: volume
        tests:
          - not_null
