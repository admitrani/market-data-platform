name: GCP Auth Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  auth-smoke:
    name: Authenticate to GCP with WIF
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: "market-data-platform-adam-dev"
          workload_identity_provider: "projects/445925379836/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider"
          service_account: "github-actions-ci@market-data-platform-adam-dev.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify active account
        run: |
          gcloud auth list
          gcloud projects describe "market-data-platform-adam-dev" --format="value(projectId)"
