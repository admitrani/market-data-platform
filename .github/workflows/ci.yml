name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Local quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Prepare local environment file for Docker Compose config
        run: |
          cp .env.example .env || true

      - name: Lint Python
        run: make lint

      - name: Run unit tests
        run: make test

      - name: Parse dbt project
        run: make dbt-parse

      - name: Check Terraform
        run: make terraform-check

      - name: Check Docker Compose config
        run: make docker-check
