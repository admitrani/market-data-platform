[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | \.venv-airflow
  | \.airflow_home
  | \.pytest_cache
  | dbt/target
  | dbt/logs
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    ".venv-airflow",
    ".airflow_home",
    ".pytest_cache",
    "dbt/target",
    "dbt/logs",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra"

[tool.ruff.lint.isort]
known-third-party = ["airflow", "requests"]
